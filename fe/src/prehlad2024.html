<!DOCTYPE html>
<html>
<head>
    <title>Prehľad 2024</title>
    <link rel="stylesheet" type="text/css" href="prehlad.css">
</head>
<body>
<h1>
    PREHĽAD 2024
</h1>
<select id="mode" onchange="loadData()">
    <option value="daily">Denný</option>
    <option value="weekly">Týždenný</option>
    <option value="monthly">Mesačný</option>
</select>
<div id="config" data-year="2024"></div>
<div class="table-container">
<table id="dataTable" border="1" id="dataTable">
    <thead>
        <tr>
            <th>Dátum</th>
            <th>Produkcia [kW]</th>
            <th>Teplota [°C]</th>
            <th>Svetelnosť [W/m²]</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>
</div>
<div class="download-div">
    <button onclick="downloadFile()">Uložiť tabuľku</button>
</div>
<div class="chart-name">
  <h2>Produkcia [kW]</h2>
</div>
<canvas class=chart id="chart" width="800" height="400"></canvas>
<div class="chart-name">
  <h2>Svetelnost [W/m²]</h2>
</div>
<canvas class=chart id="chart2" width="800" height="400"></canvas>
<div class="chart-name">
  <h2>Tepolota [°C]</h2>
</div>
<canvas class=chart id="chart3" width="800" height="400"></canvas>
<div class="chart-name">
  <h2>Spolu</h2>
</div>
<canvas class=chart id="chart4" width="800" height="400"></canvas>

    <div>
        <button id="corr-btn" class="corr-button" onclick="loadCorr()">Korelácia</button>
        <div id="corr-div" class="corr-div"></div>
        <div class="corr-img" id="corr-img"></div>
    </div>


    <div class="back-button">
        <a href="index.html">
            <button class="but">Späť na hlavné menu</button>
        </a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
